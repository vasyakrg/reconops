{{define "layout"}}<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Recon — {{.Title}}</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; max-width: 1100px; margin: 2em auto; padding: 0 1em; color: #222; }
  h1 { margin-bottom: 0; }
  nav a { margin-right: 1em; }
  table { border-collapse: collapse; width: 100%; margin-top: 1em; }
  th, td { padding: 6px 10px; border-bottom: 1px solid #ddd; text-align: left; font-size: 14px; }
  th { background: #f7f7f7; }
  .status-online   { color: #1a7f37; font-weight: 600; }
  .status-offline  { color: #c93c37; font-weight: 600; }
  .status-degraded { color: #b58900; font-weight: 600; }
  .small { color: #888; font-size: 12px; }
  .empty { color: #888; font-style: italic; }
  pre { background: #f4f4f4; padding: 8px; overflow: auto; font-size: 12px; }
</style>
</head>
<body>
  <h1>Recon</h1>
  <p class="small">Read-only diagnostic hub · v{{.Version}}</p>
  <nav><a href="/hosts">Hosts</a></nav>
  {{template "content" .}}
</body>
</html>{{end}}
