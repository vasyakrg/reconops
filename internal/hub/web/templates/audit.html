{{define "audit"}}
<h2>Audit log</h2>
<form method="get" action="/audit" class="inline">
  <label class="small">actor: <input type="text" name="actor" value="{{.Actor}}" size="20"></label>
  <label class="small">action: <input type="text" name="action" value="{{.Action}}" size="30"></label>
  <button type="submit">filter</button>
  <a href="/audit" class="small">reset</a>
</form>
{{if .Entries}}
<table>
  <thead><tr><th>Time (UTC)</th><th>Actor</th><th>Action</th><th>Details</th></tr></thead>
  <tbody>
  {{range .Entries}}
    <tr>
      <td class="small">{{.TS.Format "2006-01-02 15:04:05"}}</td>
      <td><code>{{.Actor}}</code></td>
      <td><code>{{.Action}}</code></td>
      <td>
        {{if .Details}}<details><summary>show</summary><pre>{{.Details | mapJSON}}</pre></details>{{end}}
      </td>
    </tr>
  {{end}}
  </tbody>
</table>
{{else}}
<p class="empty">No audit entries yet.</p>
{{end}}
{{end}}
