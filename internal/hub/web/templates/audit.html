{{define "audit"}}
<h2>Audit log</h2>
{{if .Entries}}
<table>
  <thead><tr><th>Time (UTC)</th><th>Actor</th><th>Action</th><th>Details</th></tr></thead>
  <tbody>
  {{range .Entries}}
    <tr>
      <td class="small">{{.TS.Format "2006-01-02 15:04:05"}}</td>
      <td><code>{{.Actor}}</code></td>
      <td><code>{{.Action}}</code></td>
      <td>
        {{if .Details}}<details><summary>show</summary><pre>{{.Details | mapJSON}}</pre></details>{{end}}
      </td>
    </tr>
  {{end}}
  </tbody>
</table>
{{else}}
<p class="empty">No audit entries yet.</p>
{{end}}
{{end}}
