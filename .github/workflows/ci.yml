name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs for the same ref — saves CI minutes on rapid pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go mod download
        run: go mod download
      - name: go test
        run: go test -race -timeout 120s ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          # Pin to whatever your local .golangci.yml was authored against.
          # Bump alongside the rules.
          version: v2.5.0

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build hub + agent
        run: make build
      - name: smoke run --help
        run: |
          ./bin/recon-hub --help 2>&1 | head -5 || true
          ./bin/recon-agent --help 2>&1 | head -5 || true
