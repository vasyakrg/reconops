name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create the GitHub Release + upload assets

jobs:
  artefacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # so `git describe` / Makefile commit ldflag works
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: extract version from tag
        id: ver
        run: echo "v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: build dist tarballs (linux/amd64+arm64)
        env:
          DIST_VER: ${{ steps.ver.outputs.v }}
        run: make dist DIST_VER="$DIST_VER"

      - name: list artefacts
        run: ls -la dist/

      - name: sha256 checksums
        working-directory: dist
        run: sha256sum *.tar.gz > SHA256SUMS

      - name: create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS

  docker:
    # Image build is independent of the binary tarballs and runs in parallel.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/recon-hub
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
      - name: build & push hub image (linux/amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: hub-runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: extract agent image metadata
        id: meta-agent
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/recon-agent
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
      - name: build & push agent image (linux/amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: agent-runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-agent.outputs.tags }}
          labels: ${{ steps.meta-agent.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
