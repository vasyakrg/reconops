<!doctype html>
<html lang="en"><head>

</head><body>
<div class="app"><div id="sidebar-slot"></div>

<div class="pg-body"><div class="panel"><table class="tbl" id="tbl"></table></div></div>

<script src="static/hub.js"></script>
<script>
document.getElementById('sidebar-slot').outerHTML = Recon.renderSidebar('runs');
const runs = [
  {id:'run_01JK3Z7A', coll:'file_read', hosts:'m1,m2', inv:'inv_…VPQAF', status:'ok', started:'14:05:41', dur:'0.5s'},
  {id:'run_01JK3Z6C', coll:'journal_tail', hosts:'m3', inv:'inv_…VPQAF', status:'ok', started:'14:03:18', dur:'0.4s'},

<td><span class="badge ${b[r.status]}">${r.status}</span></td>

<td class="mono" style="color:var(--fg-1)">${r.dur}</td>

Recon.mountTweaks({});
