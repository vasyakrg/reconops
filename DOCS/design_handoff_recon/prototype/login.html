<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><title>Recon — Log in</title>
<meta name="viewport" content="width=1280"/>
<link rel="stylesheet" href="static/hub.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
</head><body>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,var(--bg-2) 0,var(--bg-0) 70%)">
  <div style="width:380px">
    <div style="display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px">
      <span style="width:32px;height:32px;color:var(--accent);display:inline-flex" id="brand-mark"></span>
      <span style="font-size:22px;font-weight:600;letter-spacing:-0.02em">recon</span>
    </div>
    <div class="panel" style="padding:24px">
      <div class="t-lg" style="margin-bottom:4px">Log in</div>
      <div class="muted t-xs" style="margin-bottom:20px">Operator access only · mTLS + user auth</div>
      <label style="font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--fg-3);display:block;margin-bottom:4px">Username</label>
      <input type="text" placeholder="vasyansk" style="width:100%;margin-bottom:12px"/>
      <label style="font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--fg-3);display:block;margin-bottom:4px">Password</label>
      <input type="password" placeholder="••••••••" style="width:100%;margin-bottom:18px"/>
      <button class="btn primary" style="width:100%">Log in</button>
      <div class="muted t-xs" style="text-align:center;margin-top:14px;font-family:var(--font-mono)">hub.example.com:8080 · v0.1.3</div>
    </div>
    <div class="muted t-xs" style="text-align:center;margin-top:16px;line-height:1.6">read-only diagnostic system · by construction no write operations exist</div>
  </div>
</div>
<script src="static/hub.js"></script>
<script>document.getElementById('brand-mark').innerHTML = Recon.BRAND;</script>
</body></html>
